<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資工選課表 - HW2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }
        /* 綠色表頭樣式  */
        th {
            background-color: #00A86B; 
            color: white;
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        td {
            padding: 10px;
            border: 1px solid #ddd;
            color: #333;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .btn-center {
            display: block;
            margin: 20px auto;
        }
        .popover-link {
            color: #0d6efd;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>資工選課表</h1>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>資工系</td>
                <td>
                    <span class="popover-link" 
                          data-bs-toggle="popover" 
                          title="課程詳細資訊" 
                          data-bs-content="學年/學期：114/2 | 地點：資工系電腦教室2">
                        物件導向軟體設計
                    </span>
                </td>
                <td>黃崇源</td>
            </tr>
            <tr><td>資工系</td><td>計算機網路實驗</td><td>李春良</td></tr>
            <tr><td>資工系</td><td>作業系統實務</td><td>張哲維</td></tr>
            <tr><td>資工系</td><td>生物統計</td><td>陳光武</td></tr>
            <tr><td>資工系</td><td>通訊系統</td><td>陳仁暉</td></tr>
            <tr><td>資工系</td><td>軟硬體專題(2)</td><td>魏志達</td></tr>
        </tbody>
    </table>

    <button class="btn btn-success btn-center" onclick="changeResult()">Change</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 1. 初始化 Popover 效果
        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
          return new bootstrap.Popover(popoverTriggerEl)
        })

        // 2. 實作點擊修改功能 (Page 80-81) [cite: 44, 61]
        function changeResult() {
            var myTable = document.getElementById("csie");
            // 將第 1 列 (index 1) 的第 3 格 (index 2) 改為李春良 [cite: 46]
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }
    </script>

</body>
</html>
